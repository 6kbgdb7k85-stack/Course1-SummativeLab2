<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./trivia-styles.css" />
    <script src="./lib/timer-management.js"></script>
    <script src="./lib/trivia-state.js" defer></script>
    <script src="./lib/trivia-utils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&display=swap" rel="stylesheet">
    <title>Random Trivia</title>
  </head>
  <body>
    <div id="trivia-container" class="hidden">
      <header>
        <h1 id="question-header"></h1>
      </header>
      <div class="trivia-grid">
        <div id="question-panel" class="question-panel">
          <p id="trivia-question"></p>
          <select id="question-options" name="selection"></select>
          <button id="submit-button" onclick="submitAnswer(triviaState)">
            Submit
          </button>
          <button
            id="next-button"
            disabled="true"
            onclick="updateTriviaState(triviaState, 'next')"
          >
            Next
          </button>
          <p id="answer-explaination"></p>
          <div id="sources-section">
            <h6>Sources (revealed after answering):</h6>
            <div id="answer-sources"></div>
          </div>
        </div>
        <div id="timer-panel" class="trivia-timer"></div>
      </div>
    </div>
    <div id="menu-container" class="menu-container">
      <header>
        <h1>Welcome to Random Trivia</h1>
        <h3>Select and option below</h3>
      </header>
      <div id="menu">
        <button onclick="updateTriviaState(triviaState, 'start')">
          Begin Trivia Quiz
        </button>
        <br />
        <button
          id="results-button"
          onclick="updateTriviaState(triviaState, 'complete')"
          disabled="true"
        >
          View Results
        </button>
        <br />
        <button
          id="reset-button"
          onclick="updateTriviaState(triviaState, 'reset')"
          disabled="true"
        >
          Reset
        </button>
      </div>
    </div>
    <div id="results-container" class="hidden">
      <header>
        <h1>Results</h1>
      </header>
      <div id="results"></div>
      <button onclick="updateTriviaState(triviaState, 'return')">Return</button>
    </div>
    <footer>
      <a href="../../index.html">return</a>
    </footer>
  </body>
</html>
